<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1720" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="game.js"></script>
  <title>在线游戏 Pro</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: rgba(16, 24, 32, 0.72);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text: #eef4fb;
      --muted: rgba(238, 244, 251, 0.72);
      --accent: #f6c453;
      --radius: 22px;
      --wood-image: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.06)),
        repeating-linear-gradient(90deg, rgba(96, 60, 25, 0.22) 0 18px, rgba(124, 84, 40, 0.14) 18px 36px),
        linear-gradient(135deg, #8e6337 0%, #6f4827 48%, #8e6337 100%);
    }

    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* 1. 登录覆盖层 */
    #login-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center;
    }

    /* 2. 游戏选择页面 */
    #game-selection {
      position: fixed; inset: 0; z-index: 500;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #1a2635, #0f1720);
    }

    /* 3. 游戏主界面容器 */
    .app { display: none; height: 100vh; grid-template-rows: auto 1fr; }

    .card {
      background: var(--panel); border: 1px solid var(--panel-border);
      padding: 30px; border-radius: var(--radius); text-align: center;
      backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .topbar {
      padding: 12px 20px; background: rgba(13, 20, 28, 0.8);
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--panel-border); z-index: 100;
    }

    .badge {
      padding: 6px 14px; background: rgba(255,255,255,0.06);
      border: 1px solid var(--panel-border); border-radius: 999px; font-size: 0.85rem; margin-left: 8px;
    }

    .board-shell {
      display: flex; justify-content: center; align-items: center;
      background: var(--wood-image); position: relative;
    }

    canvas { max-width: 90vmin; max-height: 90vmin; box-shadow: 0 20px 60px rgba(0,0,0,0.4); cursor: pointer; }

    .floating-actions { position: fixed; right: 20px; bottom: 20px; z-index: 900; }

    button {
      padding: 12px 24px; border-radius: 12px; border: none; font-weight: bold;
      cursor: pointer; transition: 0.2s; background: var(--accent); color: #000;
    }
    button.danger { background: #ff4d4f; color: white; }
    button:hover { transform: translateY(-2px); opacity: 0.9; }

    h1 { margin-bottom: 20px; letter-spacing: 2px; }
  </style>
</head>
<body>

  <!-- 登录流程第一步：强制登录框 -->
 <!-- 找到这个 ID，确保 style 里有 display: flex !important -->
<div id="login-overlay" style="display: flex !important; position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.95); align-items: center; justify-content: center;">
  <div class="card">
    <h1>在线游戏 Pro</h1>
    <p>请先登录以开启您的对局</p>
    <button onclick="loginWithSupabase()">授权登录 / 游客进入</button>
  </div>
</div>


  <!-- 登录流程第二步：游戏选项 -->
  <div id="game-selection">
    <div class="card">
      <h1>选择模式</h1>
      <button id="go-game-btn" style="font-size: 1.2rem; padding: 15px 40px;">经典围棋 19x19</button>
      <p style="margin-top: 15px; font-size: 0.8rem; color: var(--muted);">在线对战模式即将开启</p>
    </div>
  </div>

  <!-- 登录流程第三步：对战界面 -->
  <div class="app">
    <header class="topbar">
      <div class="brand"><strong>围棋 Pro</strong></div>
      <div class="status">
        <span class="badge">轮到：<b id="currentPlayer" style="color:var(--accent)">黑子</b></span>
        <span class="badge">黑提：<b id="blackCaptures">0</b></span>
        <span class="badge">白提：<b id="whiteCaptures">0</b></span>
      </div>
    </header>

    <main class="board-shell">
      <canvas id="goBoard"></canvas>
    </main>

    <div class="floating-actions">
      <!-- 退出按钮 -->
      <button id="quit-game-btn" class="danger">退出游戏</button>
    </div>
  </div>

  <script>
    // 确保页面加载后，Canvas 能正确获取到（用于 game.js 初始化）
    window.onload = () => {
      if (typeof initEventListeners === 'function') {
        initEventListeners();
      }
    };
  </script>
</body>
</html>
