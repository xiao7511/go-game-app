<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1720" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="/go-game-app/icon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="game.js"></script>
  <title>围棋 Pro</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: rgba(16, 24, 32, 0.72);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text: #eef4fb;
      --muted: rgba(238, 244, 251, 0.72);
      --accent: #f6c453;
      --accent-2: #6ee7ff;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --radius: 22px;
      --wood-image: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.06)),
        repeating-linear-gradient(90deg, rgba(96, 60, 25, 0.22) 0 18px, rgba(124, 84, 40, 0.14) 18px 36px),
        linear-gradient(135deg, #8e6337 0%, #6f4827 48%, #8e6337 100%);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(110, 231, 255, 0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(246, 196, 83, 0.10), transparent 25%),
        var(--wood-image);
      background-attachment: fixed;
      overflow-x: visible;
      overflow-y: auto;
    }

    body.is-immersive .topbar,
    body.is-immersive .footer,
    body.is-immersive .sidebar {
      opacity: 0.03;
      pointer-events: none;
    }

    .app {
      position: relative;
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 0;
      padding: 0;
      overflow: visible;
    }

    .topbar,
    .footer,
    .card {
      border: 1px solid var(--panel-border);
      background: rgba(13, 20, 28, 0.70);
      backdrop-filter: blur(14px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      position: fixed;
      left: 12px;
      right: 12px;
      top: 12px;
      z-index: 15;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand { display: grid; gap: 4px; }
    .brand h1,
    .brand p { margin: 0; }
    .brand h1 { font-size: clamp(1.05rem, 3vw, 1.5rem); letter-spacing: 0.04em; }
    .brand p { color: var(--muted); font-size: 0.88rem; }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      text-align: right;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-weight: 700;
      font-size: 0.84rem;
      white-space: nowrap;
    }

    .layout {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr;
      min-height: 0;
    }

    .board-shell {
      display: none;
    }

    .sidebar {
      position: fixed;
      right: 12px;
      top: 74px;
      bottom: 76px;
      z-index: 20;
      width: min(320px, 88vw);
      display: grid;
      gap: 12px;
      overflow: auto;
      padding-right: 2px;
    }

    .card {
      padding: 14px;
    }

    .card h2,
    .card h3 {
      margin: 0 0 12px;
      font-size: 1rem;
    }

    .auth-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .tab {
      flex: 1;
      min-height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }

    .tab.is-active {
      background: linear-gradient(180deg, #ffe08a 0%, #f6c453 100%);
      color: #0f1720;
      border-color: transparent;
    }

    .form {
      display: grid;
      gap: 10px;
    }

    .form[hidden] { display: none; }

    input, button, textarea { font: inherit; }
    input {
      width: 100%;
      min-height: 44px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10, 16, 22, 0.7);
      color: var(--text);
      outline: none;
    }

    input::placeholder { color: rgba(238,244,251,0.4); }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      min-height: 44px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      color: #0f1720;
      background: linear-gradient(180deg, #ffe08a 0%, #f6c453 100%);
      box-shadow: 0 10px 20px rgba(246, 196, 83, 0.18);
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.03); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    button.secondary {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: none;
    }

    .stack { display: grid; gap: 10px; }

    .user-box {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .user-box strong { font-size: 1rem; }
    .user-box small { color: var(--muted); }

    .board-shell {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      overflow: hidden;
      padding: 0;
      transform-style: preserve-3d;
      z-index: 1;
      pointer-events: none;
    }

    .board-shell.is-active {
      pointer-events: auto;
    }

    .board-stage {
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
      max-width: 100vw;
      max-height: 100vh;
      transform: perspective(1000px) rotateX(25deg);
      transform-origin: center center;
      display: grid;
      place-items: center;
      overflow: visible;
    }

    .board-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      border-radius: 0;
      background: var(--wood-image);
      box-shadow: inset 0 0 0 1px rgba(80, 52, 18, 0.18), 0 30px 90px rgba(0,0,0,0.36);
      overflow: visible;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: pointer;
    }

    .footer {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 15;
      max-width: 360px;
      padding: 10px 14px;
      font-size: 0.88rem;
      color: rgba(238,244,251,0.62);
      background: rgba(13, 20, 28, 0.56);
      backdrop-filter: blur(10px);
    }

    .floating-actions {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 30;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      padding: 0;
      color: #eef4fb;
      background: rgba(16, 24, 32, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.28);
    }

    .icon-btn svg { width: 22px; height: 22px; }

    .drawer {
      position: fixed;
      left: 12px;
      bottom: 76px;
      z-index: 30;
      width: min(320px, calc(100vw - 24px));
      display: grid;
      gap: 12px;
      transform: translateY(130%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .drawer.is-open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .drawer .card {
      background: rgba(13, 20, 28, 0.90);
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .metric strong { color: var(--text); }

    .move-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      display: grid;
      gap: 6px;
      max-height: 240px;
      overflow: auto;
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.6;
    }

    @media (max-width: 960px) {
      .sidebar {
        width: min(92vw, 360px);
      }
      .board-stage {
        width: 100vw;
        height: 100vw;
        max-width: 100vh;
        max-height: 100vh;
      }
    }

    @media (max-width: 720px) {
      .topbar,
      .footer,
      .sidebar {
        display: none;
      }
      .board-stage {
        width: 100vw;
        height: 100vh;
        transform: perspective(1000px) rotateX(25deg) translateY(-2vh);
      }
      .floating-actions { left: 10px; bottom: 10px; }
      .drawer { left: 10px; bottom: 72px; }
    }

    @media (max-width: 520px) {
      .panel-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>围棋 Pro</h1>
        <p>19×19 · 全屏沉浸 · 3D 棋盘 · 在线实时同步</p>
      </div>
      <div class="status">
        <span class="badge" id="authBadge">未登录</span>
        <span class="badge" id="matchBadge">本地模式</span>
        <span class="badge" id="turnBadge">轮到：黑棋</span>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="card">
          <h2>账户系统</h2>
          <div class="auth-tabs">
            <button class="tab is-active" id="loginTab" type="button">登录</button>
            <button class="tab" id="registerTab" type="button">注册</button>
          </div>
          <form class="form" id="loginForm">
            <input id="loginEmail" type="email" placeholder="邮箱" autocomplete="email" required>
            <input id="loginPassword" type="password" placeholder="密码" autocomplete="current-password" required>
            <button type="submit">登录</button>
          </form>
          <form class="form" id="registerForm" hidden>
            <input id="registerName" type="text" placeholder="昵称" autocomplete="nickname" required>
            <input id="registerEmail" type="email" placeholder="邮箱" autocomplete="email" required>
            <input id="registerPassword" type="password" placeholder="密码（至少 6 位）" autocomplete="new-password" required>
            <button type="submit">注册</button>
          </form>
          <div class="user-box" id="userBox">
            <strong id="userName">游客</strong>
            <small id="userEmail">请先登录后开启在线匹配</small>
          </div>
        </section>

        <section class="card">
          <h2>在线匹配</h2>
          <div class="stack">
            <button type="button" id="findOpponentBtn">寻找对手</button>
            <button type="button" class="secondary" id="leaveMatchBtn" disabled>离开房间</button>
            <button type="button" class="secondary" id="settingsBtn">设置</button>
            <button type="button" class="secondary" id="logoutBtn">退出登录</button>
          </div>
          <p class="hint" id="matchHint">点击“寻找对手”后，系统会把你放进 waiting_room；若发现其他等待玩家，会自动创建 game_session。</p>
        </section>

        <section class="card">
          <h2>对局信息</h2>
          <div class="panel-grid">
            <div class="metric"><span>已落子</span><strong id="moveCount">0</strong></div>
            <div class="metric"><span>黑棋提子</span><strong id="blackCaptures">0</strong></div>
            <div class="metric"><span>白棋提子</span><strong id="whiteCaptures">0</strong></div>
            <div class="metric"><span>角色</span><strong id="roleText">本地</strong></div>
          </div>
        </section>

        <section class="card">
          <h2>操作</h2>
          <div class="stack">
            <button type="button" class="secondary" id="undoBtn">悔棋</button>
            <button type="button" id="resetBtn">重新开始</button>
          </div>
        </section>

        <section class="card">
          <h2>落子记录</h2>
          <ol class="move-list" id="moveList"></ol>
        </section>
      </aside>

      <section class="board-shell">
        <div class="board-stage" id="boardStage">
          <div class="board-wrap">
            <canvas id="board" aria-label="围棋棋盘"></canvas>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      HTML5 + CSS3 + JavaScript · Supabase 实时匹配与同步 · PWA 离线可用
    </footer>
  </div>

  <div class="floating-actions">
    <button class="icon-btn" id="drawerToggle" type="button" aria-label="打开菜单">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M4 7h16M4 12h16M4 17h16" />
      </svg>
    </button>
  </div>

  <div class="drawer" id="drawerPanel">
    <section class="card">
      <h3>快捷操作</h3>
      <div class="stack">
        <button type="button" id="drawerUndoBtn" class="secondary">悔棋</button>
        <button type="button" id="drawerSettingsBtn" class="secondary">设置</button>
        <button type="button" id="drawerResetBtn">重新开始</button>
      </div>
    </section>
  </div>
</body>
</html>
