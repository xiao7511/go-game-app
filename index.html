<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>围棋 Pro</title>
  <script src="https://jsdelivr.net"></script>
  <script src="config.js"></script>
  <script src="game.js"></script>
  <style>
    :root {
      --bg: #0f1720;
      --panel: rgba(16, 24, 32, 0.72);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text: #eef4fb;
      --muted: rgba(238, 244, 251, 0.72);
      --accent: #f6c453;
      --radius: 22px;
      --wood-image: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.06)),
        repeating-linear-gradient(90deg, rgba(96, 60, 25, 0.22) 0 18px, rgba(124, 84, 40, 0.14) 18px 36px),
        linear-gradient(135deg, #8e6337 0%, #6f4827 48%, #8e6337 100%);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      background-attachment: fixed;
      overflow: hidden;
      height: 100vh;
    }

    /* 游戏选项页面（登录后显示） */
    #game-selection {
      position: fixed;
      inset: 0;
      display: none; /* 初始隐藏，由 JS 控制 */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: radial-gradient(circle, #1a2635 0%, #0f1720 100%);
    }

    .menu-card {
      background: var(--panel);
      padding: 40px;
      border-radius: var(--radius);
      border: 1px solid var(--panel-border);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* 游戏主容器 */
    .app {
      display: none; /* 初始隐藏 */
      height: 100vh;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      padding: 15px 20px;
      background: rgba(13, 20, 28, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--panel-border);
    }

    .badge {
      padding: 6px 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      font-size: 0.9rem;
      margin-left: 10px;
    }

    .board-shell {
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--wood-image);
    }

    canvas {
      max-width: 95vmin;
      max-height: 95vmin;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      cursor: crosshair;
    }

    .floating-actions {
      position: fixed;
      right: 20px;
      bottom: 20px;
      display: flex;
      gap: 15px;
    }

    button {
      padding: 12px 25px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-primary { background: var(--accent); color: #000; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    button:hover { opacity: 0.9; transform: scale(1.05); }

    #login-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.85); display: grid; place-items: center;
    }
  </style>
</head>
<body>

  <!-- 1. 登录层 (由 JS 管理显示隐藏) -->
  <div id="login-overlay">
    <div class="menu-card">
      <h2>欢迎来到围棋 Pro</h2>
      <p>请先登录以开始游戏</p>
      <button class="btn-primary" onclick="loginWithSupabase()">游客登录 / 账号登录</button>
    </div>
  </div>

  <!-- 2. 游戏选项页面 -->
  <div id="game-selection">
    <div class="menu-card">
      <h1>选择游戏模式</h1>
      <div style="margin-top: 20px;">
        <button id="go-game-btn" class="btn-primary" style="font-size: 1.2rem;">经典围棋 (19x19)</button>
      </div>
    </div>
  </div>

  <!-- 3. 游戏对战容器 -->
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <strong>围棋 Pro</strong>
      </div>
      <div class="status">
        <span class="badge">当前落子: <b id="currentPlayer" style="color: var(--accent);">黑棋</b></span>
        <span class="badge">黑方提子: <b id="blackCaptures">0</b></span>
        <span class="badge">白方提子: <b id="whiteCaptures">0</b></span>
      </div>
    </header>

    <main class="board-shell">
      <div class="board-stage">
        <canvas id="goBoard"></canvas>
      </div>
    </main>

    <div class="sidebar" style="display:none;">
      <!-- 侧边栏内容 -->
    </div>

    <!-- 底部悬浮按钮 -->
    <div class="floating-actions">
      <button id="quit-game-btn" class="btn-danger">退出游戏</button>
    </div>
  </div>

</body>
</html>
