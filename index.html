<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端视口优化 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">   
    <!-- PWA 清单文件引用 (关键：安卓图标靠它) -->
    <!--<link rel="manifest" href="manifest.json">-->
    <!-- iOS 图标与全屏设置 -->
<!-- 找到以下两行，并在文件名后添加版本查询参数 -->
    <link rel="manifest" href="manifest.json?v=202605031730">
    <link rel="apple-touch-icon" sizes="180x180" href="/go-game-app/apple-touch-icon.png?v=3">
    <link rel="icon" type="image/png" sizes="32x32" href="/go-game-app/icon-192.png?v=2">
    <!--<link rel="apple-touch-icon" href="apple-touch-icon.png">-->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="在线游戏 Pro">
    <!-- 立即跳转到 login.html -->
    <meta http-equiv="refresh" content="0; url=login.html">
    <script>
        // 使用 replace 确保用户按返回键时不会回到此页面导致无限循环
        window.location.replace("login.html");
    </script>
    <title>正在进入在线游戏...</title>
</head>
