name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Runtime Config
        env:
          # 从 GitHub Secrets 中读取
          S_URL: ${{ secrets.SUPABASE_URL }}
          S_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # 直接用 shell 或 python 生成文件
          echo "window.SUPABASE_URL = '$S_URL';" > config.js
          echo "window.SUPABASE_ANON_KEY = '$S_KEY';" >> config.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .  # 确保 config.js 和 index.html 都在这个目录下

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
