<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- 可选：设置状态栏颜色 -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1720" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.local.js"></script>
  <script src="config.js"></script> <!-- config.js 是处理合并逻辑的文件 -->
  <title>登录 - 在线游戏 Pro</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: rgba(16, 24, 32, 0.72);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text: #eef4fb;
      --muted: rgba(238, 244, 251, 0.72);
      --accent: #f6c453;
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body, html {
      margin: 0; padding: 0; height: 100%;
      font-family: sans-serif;
      background: radial-gradient(circle at center, #1a2635, #0f1720);
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      padding: 40px;
      border-radius: var(--radius);
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 400px;
    }
    h1 { margin-bottom: 10px; letter-spacing: 2px; }
    p.desc { color: var(--muted); margin-bottom: 25px; }
    input {
      padding: 12px; margin-bottom: 12px; width: 100%;
      border-radius: 8px; border: 1px solid var(--panel-border);
      background: rgba(0,0,0,0.3); color: var(--text); font-size: 1rem;
    }
    button {
      padding: 12px 24px; border-radius: 12px; border: none;
      font-weight: bold; cursor: pointer; transition: 0.2s;
      background: var(--accent); color: #000;
      width: 100%; font-size: 1rem; margin-top: 8px;
    }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .link-row { margin-top: 20px; font-size: 0.85rem; color: var(--muted); }
    .link-row a { color: var(--accent); text-decoration: none; }
    .error-msg { color: #ff4d4f; font-size: 0.85rem; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>在线游戏 Pro</h1>
    <p class="desc">请登录以开启您的对局</p>
    <form id="login-form" onsubmit="handleLogin(event)">
      <input type="email" id="login-email" placeholder="邮箱地址" required autocomplete="email">
      <input type="password" id="login-password" placeholder="密码" required autocomplete="current-password">
      <button type="submit" id="login-btn">登录</button>
    </form>
    <p class="error-msg" id="login-error"></p>
    <div class="link-row">
      没有账号？<a href="register.html">用户注册</a>
    </div>
  </div>

  <script>
    async function handleLogin(event) {
      event.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorEl = document.getElementById('login-error');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.innerText = '登录中...';

      try {
        //const cfg = window.APP_CONFIG || {};
        const response = await fetch('/get-config');
        const config = await response.json();
        if (!config.SUPABASE_URL || !config.SUPABASE_ANON_KEY) {
          throw new Error('配置缺失，请检查 config.local.js');
        }
        const { createClient } = window.supabase;
        const client = createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        const { data, error } = await client.auth.signInWithPassword({ email, password });
        if (error) throw error;

        const userInfo = {
          uid: data.user.id,
          nickname: data.user.user_metadata.nickname || '新玩家',
          avatar: data.user.user_metadata.avatar_url || `https://api.dicebear.com/7.x/pixel-art/svg?seed=${data.user.id}`,
          rank: data.user.user_metadata.rank || '1 Dan'
        };
        sessionStorage.setItem('userInfo', JSON.stringify(userInfo));
        window.location.href = 'game.html';
      } catch (err) {
        errorEl.textContent = '登录失败: ' + err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.innerText = '登录';
      }
    }
  </script>
</body>
</html>
