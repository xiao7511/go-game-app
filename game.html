<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1720" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="game.js"></script>
  <script src="multiplayer-ext.js"></script>
  <title>围棋 Pro - 在线对战</title>
  <style>
    :root {
      --bg: #0f1720;
      --panel: rgba(16, 24, 32, 0.72);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text: #eef4fb;
      --muted: rgba(238, 244, 251, 0.72);
      --accent: #f6c453;
      --radius: 22px;
      --wood-image: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.06)),
        repeating-linear-gradient(90deg, rgba(96, 60, 25, 0.22) 0 18px, rgba(124, 84, 40, 0.14) 18px 36px),
        linear-gradient(135deg, #8e6337 0%, #6f4827 48%, #8e6337 100%);
      /* 定义房间面板距离顶部的默认距离 */
      --mp-panel-top: 60px; 
    }
      /* 媒体查询：当屏幕宽度小于 768px（手机端）时，增加顶部间距 */
   /* 当屏幕高度较小或宽度较窄（手机端）时 */
    @media (max-width: 768px) {
      :root {
        /* 将面板移动到棋盘下方，或者顶部导航栏更下方的位置 */
        --mp-panel-top: 15vh; 
      }
      
      #mp-room-panel {
        transform: scale(0.9); /* 手机端稍微缩小面板 */
        transform-origin: right top;
      }
    }
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── 游戏选择页面 ── */
    #game-selection {
      position: fixed; inset: 0; z-index: 500;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, #1a2635, #0f1720);
    }
    .card {
      background: var(--panel); border: 1px solid var(--panel-border);
      padding: 30px; border-radius: var(--radius); text-align: center;
      backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .badge {
      padding: 6px 14px; background: rgba(255,255,255,0.06);
      border: 1px solid var(--panel-border); border-radius: 999px; font-size: 0.85rem; margin-left: 8px;
    }

    /* ── 游戏主界面 ── */
    .app { display: none; height: 100vh; grid-template-rows: auto 1fr; }

    .topbar {
      padding: 8px 16px; background: rgba(13, 20, 28, 0.8);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
      border-bottom: 1px solid var(--panel-border); z-index: 100; gap: 8px;
    }
    .topbar .status {
      display: flex; flex-wrap: wrap; gap: 4px;
    }

    /* 棋盘容器：Flex + Grid 双保险居中 */
    .board-shell {
      display: flex; justify-content: center; align-items: center;
      background: var(--wood-image); position: relative;
      width: 98vw; aspect-ratio: 1 / 1;
      max-width: 98vh; max-height: 98vh; margin: 0 auto;
    }
    canvas {
      max-width: 90vmin; max-height: 90vmin;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); cursor: pointer;
      transition: opacity 0.25s ease;
      touch-action: manipulation;
    }
    canvas.animating { pointer-events: none; opacity: 0.85; }

    /* 退出按钮 — 右下角美化 */
    .floating-quit {
      position: fixed; right: 16px; bottom: 16px; z-index: 900;
    }
    .floating-quit button {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: rgba(255, 77, 79, 0.85); color: #fff; font-size: 1.4rem;
      cursor: pointer; transition: 0.25s; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(255, 77, 79, 0.3);
      backdrop-filter: blur(6px);
    }
    .floating-quit button:hover {
      transform: scale(1.12); background: #ff4d4f; box-shadow: 0 6px 24px rgba(255, 77, 79, 0.5);
    }

    button {
      padding: 12px 24px; border-radius: 12px; border: none; font-weight: bold;
      cursor: pointer; transition: 0.2s; background: var(--accent); color: #000;
    }
    button:hover { transform: translateY(-2px); opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    h1 { margin-bottom: 20px; letter-spacing: 2px; }

    /* ── 移动端响应式 ── */
    @media (max-width: 600px) {
      .topbar { padding: 6px 10px; font-size: 0.8rem; }
      .topbar .status .badge { font-size: 0.7rem; padding: 4px 8px; margin-left: 2px; }
      .board-shell { width: 100vw; max-width: 100vw; }
      canvas { max-width: 96vmin; max-height: 96vmin; }
      .floating-quit { right: 10px; bottom: 10px; }
      .floating-quit button { width: 42px; height: 42px; font-size: 1.2rem; }
      .card { padding: 20px; width: 92%; }
      #game-selection .card button { font-size: 0.95rem; padding: 12px 20px; }
      #user-info { display: none !important; }
    }
  </style>
</head>
<body>

  <!-- 第一步：游戏模式选择 -->
  <div id="game-selection">
    <div class="card">
      <h1>选择游戏</h1>
      <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
        <button id="go-game-btn" style="font-size: 1.2rem; padding: 15px 40px; justify-content: space-between; display: flex; align-items: center;">
          经典围棋 19x19 <span class="badge" style="margin-left: auto; background: #4caf50; color: white;">已上线</span>
        </button>
        <button disabled style="font-size: 1.2rem; padding: 15px 40px; justify-content: space-between; display: flex; align-items: center; opacity: 0.6; cursor: not-allowed;">
          掼蛋 (Guandan) <span class="badge" style="margin-left: auto;">开发中</span>
        </button>
        <button disabled style="font-size: 1.2rem; padding: 15px 40px; justify-content: space-between; display: flex; align-items: center; opacity: 0.6; cursor: not-allowed;">
          上海麻将 <span class="badge" style="margin-left: auto;">待开发</span>
        </button>
      </div>
      <p style="margin-top: 15px; font-size: 0.8rem; color: var(--muted);">在线对战模式即将开启</p>
    </div>
  </div>

  <!-- 第二步：对战界面 -->
  <div class="app">
<div class="topbar">
      <div class="brand"><strong>围棋 Pro</strong></div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <!-- 我的信息（左侧） -->
        <div id="user-info" style="display: flex; align-items: center;">
          <img id="user-avatar" src="" alt="" style="width: 28px; height: 28px; border-radius: 50%; margin-right: 8px;"/>
          <span id="user-nickname"></span>
          <span id="user-rank" class="badge" style="margin-left: 8px;"></span>
        </div>
        <!-- 对手信息（右侧，多人模式下显示） -->
        <div id="opponent-info" style="display:none;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;border:1px solid rgba(246,196,83,0.35);background:rgba(246,196,83,0.08);">
          <span style="font-size:0.72rem;color:var(--muted);">VS</span>
          <span id="opponent-nickname" style="font-weight:bold;color:var(--accent);"></span>
          <span id="opponent-rank" class="badge" style="background:rgba(246,196,83,0.15);border-color:rgba(246,196,83,0.25);"></span>
        </div>
      </div>
      <div class="status">
        <span class="badge">轮到：<b id="currentPlayer" style="color:var(--accent)">黑子</b></span>
        <span class="badge">黑提：<b id="blackCaptures">0</b></span>
        <span class="badge">白提：<b id="whiteCaptures">0</b></span>
      </div>
    </header>

    <main class="board-shell">
      <canvas id="goBoard"></canvas>
    </main>

    <div class="floating-quit">
      <button id="quit-game-btn" title="退出游戏">X</button>
    </div>
  </div>

  <script>
    // 页面加载后显示用户信息
    window.onload = () => {
      const info = sessionStorage.getItem('userInfo');
      if (info) {
        const u = JSON.parse(info);
        document.getElementById('user-avatar').src = u.avatar;
        document.getElementById('user-nickname').textContent = u.nickname;
        document.getElementById('user-rank').textContent = u.rank;
      }
      if (typeof initEventListeners === 'function') initEventListeners();
    };

    // 围棋按钮 → 进入游戏
    document.getElementById('go-game-btn').addEventListener('click', () => {
      document.getElementById('game-selection').style.display = 'none';
      document.querySelector('.app').style.display = 'grid';
      if (typeof initGame === 'function') {
        requestAnimationFrame(() => initGame());
      }
    });

    // 退出按钮
    document.getElementById('quit-game-btn').addEventListener('click', () => {
      if (confirm('确定要退出当前对局吗？')) {
        document.querySelector('.app').style.display = 'none';
        document.getElementById('game-selection').style.display = 'flex';
      }
    });
  </script>
</body>
</html>
